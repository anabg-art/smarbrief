<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBrief - Generador de Estructuras Web Inteligentes</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f5f5f5;
            --color-background-tertiary: #f9f9f9;
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #666666;
            --color-text-tertiary: #999999;
            --color-border-tertiary: rgba(0, 0, 0, 0.1);
            --color-border-secondary: rgba(0, 0, 0, 0.15);
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background-primary: #1a1a1a;
                --color-background-secondary: #2a2a2a;
                --color-background-tertiary: #0d0d0d;
                --color-text-primary: #ffffff;
                --color-text-secondary: #b0b0b0;
                --color-text-tertiary: #808080;
                --color-border-tertiary: rgba(255, 255, 255, 0.1);
                --color-border-secondary: rgba(255, 255, 255, 0.15);
            }
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, var(--color-background-tertiary) 0%, var(--color-background-primary) 100%);
            color: var(--color-text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        #root {
            width: 100%;
            min-height: 100vh;
        }

        select, input, textarea {
            font-family: var(--font-sans);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #185FA5;
            box-shadow: 0 0 0 2px rgba(24, 95, 165, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function SmartBrief() {
            const [step, setStep] = useState('form');
            const [formData, setFormData] = useState({
                sector: '',
                businessName: '',
                competitors: '',
                objectives: '',
                budget: ''
            });
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [leadData, setLeadData] = useState({ name: '', email: '', company: '' });

            const LOGO_URL = 'https://bluecell.es/wp-content/uploads/2024/01/bluecell-logo.svg';
            const AGENCY_URL = 'https://bluecell.es';

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleLeadChange = (e) => {
                const { name, value } = e.target;
                setLeadData(prev => ({ ...prev, [name]: value }));
            };

            const generateSitemap = async () => {
                setLoading(true);
                setStep('generating');

                const prompt = `Eres un experto en estrategia web y arquitectura de información. Un potencial cliente te proporciona estos datos:

Sector: ${formData.sector}
Nombre del negocio: ${formData.businessName}
Competidores principales: ${formData.competitors}
Objetivos: ${formData.objectives}
Presupuesto aproximado: ${formData.budget}

Genera una propuesta de estructura web (sitemap) inteligente y recomendada por IA. 

Responde ÚNICAMENTE en JSON válido con esta estructura:
{
  "comercialHook": "un gancho comercial de 1 línea basado en el sector",
  "pilares": [
    {
      "nombre": "nombre del pilar",
      "descripcion": "descripción breve",
      "paginas": ["página 1", "página 2", "página 3"],
      "contenidoClave": ["contenido 1", "contenido 2"]
    }
  ],
  "paginesPrincipales": {
    "inicio": "descripción de función",
    "servicios": "cómo estructurar",
    "casos": "qué mostrar",
    "contacto": "elementos esenciales"
  },
  "diferenciador": "propuesta única para competir contra los competidores mencionados"
}`;

                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1500,
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });

                    if (!response.ok) throw new Error('Error en API');
                    const data = await response.json();
                    const content = data.content[0].text;
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    const parsed = JSON.parse(jsonMatch ? jsonMatch[0] : content);
                    
                    setResult(parsed);
                    setStep('result');
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error generando sitemap. Intenta de nuevo.');
                    setStep('form');
                } finally {
                    setLoading(false);
                }
            };

            const exportJSON = () => {
                const dataStr = JSON.stringify({
                    ...formData,
                    sitemap: result
                }, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `sitemap-${formData.businessName.replace(/\s+/g, '-')}.json`;
                a.click();
            };

            const submitLead = async () => {
                if (!leadData.email || !leadData.name) {
                    alert('Por favor completa nombre y email');
                    return;
                }
                console.log('Lead capturado:', { ...leadData, ...formData, sitemap: result });
                setStep('lead-success');
            };

            const goToAgency = () => {
                window.open(AGENCY_URL, '_blank');
            };

            return (
                <div style={{ maxWidth: '1000px', margin: '0 auto', padding: '1.5rem 1rem', minHeight: '100vh' }}>
                    
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '2rem', paddingBottom: '1.5rem', borderBottom: `0.5px solid var(--color-border-tertiary)` }}>
                        <div style={{ fontSize: '18px', fontWeight: '600', color: 'var(--color-text-primary)', display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <span style={{ display: 'inline-block', width: '28px', height: '28px', background: '#185FA5', borderRadius: '6px' }}></span>
                            Bluecell
                        </div>
                        <button 
                            onClick={goToAgency}
                            style={{ 
                                padding: '10px 18px', 
                                background: 'transparent',
                                border: `0.5px solid var(--color-border-secondary)`,
                                borderRadius: 'var(--border-radius-md)',
                                fontSize: '13px',
                                fontWeight: '500',
                                cursor: 'pointer',
                                color: 'var(--color-text-primary)',
                                transition: 'all 0.2s'
                            }}
                        >
                            Conoce Bluecell ↗
                        </button>
                    </div>

                    {step === 'form' && (
                        <div>
                            <div style={{ marginBottom: '2.5rem', textAlign: 'center' }}>
                                <h1 style={{ fontSize: '32px', fontWeight: '500', margin: '0 0 12px', color: 'var(--color-text-primary)' }}>SmartBrief</h1>
                                <p style={{ fontSize: '16px', color: 'var(--color-text-secondary)', margin: '0 0 8px' }}>Generador de estructuras web inteligentes con IA</p>
                                <p style={{ fontSize: '14px', color: 'var(--color-text-tertiary)', margin: '0' }}>Descubre la arquitectura de información perfecta para tu negocio en menos de 2 minutos</p>
                            </div>

                            <div style={{ background: 'var(--color-background-primary)', borderRadius: 'var(--border-radius-lg)', padding: '2rem', border: `0.5px solid var(--color-border-tertiary)`, boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: 'var(--color-text-primary)' }}>¿En qué sector opera tu negocio?</label>
                                    <select 
                                        name="sector" 
                                        value={formData.sector}
                                        onChange={handleInputChange}
                                        style={{ width: '100%', padding: '11px 12px', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', fontSize: '14px', backgroundColor: 'var(--color-background-primary)', color: 'var(--color-text-primary)' }}
                                    >
                                        <option value="">Selecciona un sector...</option>
                                        <option value="Educación">Educación</option>
                                        <option value="Hospitalidad">Hospitalidad / Turismo</option>
                                        <option value="Salud">Salud y Bienestar</option>
                                        <option value="Retail">Retail / E-commerce</option>
                                        <option value="Tecnología">Tecnología</option>
                                        <option value="Servicios Financieros">Servicios Financieros</option>
                                        <option value="Real Estate">Real Estate</option>
                                        <option value="Otros">Otros</option>
                                    </select>
                                </div>

                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: 'var(--color-text-primary)' }}>Nombre de tu negocio</label>
                                    <input 
                                        type="text" 
                                        name="businessName"
                                        value={formData.businessName}
                                        onChange={handleInputChange}
                                        placeholder="Ej: Mi Hotel Premium"
                                        style={{ width: '100%', padding: '11px 12px', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', fontSize: '14px', backgroundColor: 'var(--color-background-primary)', color: 'var(--color-text-primary)' }}
                                    />
                                </div>

                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: 'var(--color-text-primary)' }}>Competidores principales (separa con comas)</label>
                                    <textarea 
                                        name="competitors"
                                        value={formData.competitors}
                                        onChange={handleInputChange}
                                        placeholder="Ej: Competidor A, Competidor B, Competidor C"
                                        style={{ width: '100%', padding: '11px 12px', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', fontSize: '14px', minHeight: '80px', backgroundColor: 'var(--color-background-primary)', color: 'var(--color-text-primary)' }}
                                    />
                                </div>

                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: 'var(--color-text-primary)' }}>Objetivos principales para tu web</label>
                                    <textarea 
                                        name="objectives"
                                        value={formData.objectives}
                                        onChange={handleInputChange}
                                        placeholder="Ej: Aumentar reservas, posicionarse como referente, generar leads"
                                        style={{ width: '100%', padding: '11px 12px', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', fontSize: '14px', minHeight: '80px', backgroundColor: 'var(--color-background-primary)', color: 'var(--color-text-primary)' }}
                                    />
                                </div>

                                <div style={{ marginBottom: '2rem' }}>
                                    <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: 'var(--color-text-primary)' }}>Presupuesto aproximado</label>
                                    <select 
                                        name="budget" 
                                        value={formData.budget}
                                        onChange={handleInputChange}
                                        style={{ width: '100%', padding: '11px 12px', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', fontSize: '14px', backgroundColor: 'var(--color-background-primary)', color: 'var(--color-text-primary)' }}
                                    >
                                        <option value="">Selecciona un rango...</option>
                                        <option value="2000-5000">$2,000 - $5,000 USD</option>
                                        <option value="5000-15000">$5,000 - $15,000 USD</option>
                                        <option value="15000-50000">$15,000 - $50,000 USD</option>
                                        <option value="50000+">$50,000+ USD</option>
                                    </select>
                                </div>

                                <button 
                                    onClick={generateSitemap}
                                    disabled={!formData.sector || !formData.businessName || !formData.competitors || !formData.objectives}
                                    style={{ 
                                        width: '100%', 
                                        padding: '13px', 
                                        background: formData.sector && formData.businessName && formData.competitors && formData.objectives ? '#185FA5' : 'var(--color-background-tertiary)',
                                        color: formData.sector && formData.businessName && formData.competitors && formData.objectives ? 'white' : 'var(--color-text-secondary)',
                                        border: 'none',
                                        borderRadius: 'var(--border-radius-md)',
                                        fontSize: '15px',
                                        fontWeight: '500',
                                        cursor: formData.sector && formData.businessName && formData.competitors && formData.objectives ? 'pointer' : 'not-allowed',
                                        transition: 'all 0.2s'
                                    }}
                                >
                                    Generar Sitemap Inteligente
                                </button>
                            </div>
                        </div>
                    )}

                    {step === 'generating' && (
                        <div style={{ textAlign: 'center', padding: '3rem 1rem' }}>
                            <div style={{ fontSize: '48px', marginBottom: '1rem', animation: 'spin 1s linear infinite' }}>⚙</div>
                            <p style={{ fontSize: '18px', color: 'var(--color-text-secondary)', marginBottom: '0.5rem' }}>Analizando tu negocio e IA está generando la estructura...</p>
                            <p style={{ fontSize: '13px', color: 'var(--color-text-tertiary)' }}>Esto toma menos de 30 segundos</p>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div>
                            <div style={{ marginBottom: '2rem' }}>
                                <button 
                                    onClick={() => setStep('form')}
                                    style={{ 
                                        padding: '10px 16px', 
                                        border: `0.5px solid var(--color-border-tertiary)`,
                                        background: 'transparent',
                                        borderRadius: 'var(--border-radius-md)',
                                        fontSize: '14px',
                                        cursor: 'pointer',
                                        color: 'var(--color-text-primary)'
                                    }}
                                >
                                    ← Empezar de nuevo
                                </button>
                            </div>

                            <div style={{ background: 'var(--color-background-primary)', borderRadius: 'var(--border-radius-lg)', padding: '2rem', marginBottom: '1.5rem', border: `0.5px solid var(--color-border-tertiary)`, boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
                                <h2 style={{ fontSize: '24px', fontWeight: '500', margin: '0 0 8px', color: 'var(--color-text-primary)' }}>Tu propuesta SmartBrief</h2>
                                <p style={{ fontSize: '14px', color: 'var(--color-text-secondary)', margin: '0 0 1.5rem', fontStyle: 'italic' }}>"{result.comercialHook}"</p>

                                <div style={{ marginBottom: '2rem' }}>
                                    <h3 style={{ fontSize: '16px', fontWeight: '500', margin: '0 0 12px', color: 'var(--color-text-primary)' }}>Pilares de contenido</h3>
                                    {result.pilares && result.pilares.map((pilar, idx) => (
                                        <div key={idx} style={{ background: 'var(--color-background-secondary)', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', padding: '12px', marginBottom: '12px' }}>
                                            <p style={{ fontSize: '14px', fontWeight: '500', margin: '0 0 8px', color: 'var(--color-text-primary)' }}>{pilar.nombre}</p>
                                            <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', margin: '0 0 8px' }}>{pilar.descripcion}</p>
                                            <div style={{ fontSize: '12px', color: 'var(--color-text-tertiary)' }}>
                                                <strong>Páginas:</strong> {pilar.paginas.join(', ')}
                                            </div>
                                            <div style={{ fontSize: '12px', color: 'var(--color-text-tertiary)', marginTop: '6px' }}>
                                                <strong>Contenido clave:</strong> {pilar.contenidoClave.join(', ')}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div style={{ background: 'var(--color-background-secondary)', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', padding: '12px', marginBottom: '2rem' }}>
                                    <h3 style={{ fontSize: '16px', fontWeight: '500', margin: '0 0 8px', color: 'var(--color-text-primary)' }}>Diferenciador vs competencia</h3>
                                    <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', margin: '0' }}>{result.diferenciador}</p>
                                </div>
                            </div>

                            <div style={{ display: 'flex', gap: '12px', marginBottom: '2rem' }}>
                                <button 
                                    onClick={exportJSON}
                                    style={{ 
                                        flex: 1,
                                        padding: '12px', 
                                        background: 'var(--color-background-secondary)',
                                        border: `0.5px solid var(--color-border-secondary)`,
                                        borderRadius: 'var(--border-radius-md)',
                                        fontSize: '14px',
                                        fontWeight: '500',
                                        cursor: 'pointer',
                                        color: 'var(--color-text-primary)',
                                        transition: 'all 0.2s'
                                    }}
                                >
                                    Descargar JSON
                                </button>
                                <button 
                                    onClick={() => setStep('capture-lead')}
                                    style={{ 
                                        flex: 1,
                                        padding: '12px', 
                                        background: '#185FA5',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: 'var(--border-radius-md)',
                                        fontSize: '14px',
                                        fontWeight: '500',
                                        cursor: 'pointer',
                                        transition: 'all 0.2s'
                                    }}
                                >
                                    Solicitar propuesta completa
                                </button>
                            </div>

                            <div style={{ background: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-lg)', padding: '1.5rem', border: `0.5px solid var(--color-border-tertiary)`, textAlign: 'center' }}>
                                <p style={{ fontSize: '14px', color: 'var(--color-text-secondary)', margin: '0 0 12px' }}>¿Listo para llevar esto más allá?</p>
                                <button 
                                    onClick={goToAgency}
                                    style={{ 
                                        padding: '11px 24px', 
                                        background: '#085041',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: 'var(--border-radius-md)',
                                        fontSize: '14px',
                                        fontWeight: '500',
                                        cursor: 'pointer'
                                    }}
                                >
                                    Explorar servicios de Bluecell
                                </button>
                            </div>
                        </div>
                    )}

                    {step === 'capture-lead' && (
                        <div>
                            <button 
                                onClick={() => setStep('result')}
                                style={{ 
                                    marginBottom: '1.5rem',
                                    padding: '10px 16px', 
                                    border: `0.5px solid var(--color-border-tertiary)`,
                                    background: 'transparent',
                                    borderRadius: 'var(--border-radius-md)',
                                    fontSize: '14px',
                                    cursor: 'pointer',
                                    color: 'var(--color-text-primary)'
                                }}
                            >
                                ← Atrás
                            </button>

                            <div style={{ background: 'var(--color-background-primary)', borderRadius: 'var(--border-radius-lg)', padding: '2rem', border: `0.5px solid var(--color-border-tertiary)`, boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
                                <h2 style={{ fontSize: '24px', fontWeight: '500', margin: '0 0 8px', color: 'var(--color-text-primary)' }}>Solicitar propuesta profesional</h2>
                                <p style={{ fontSize: '14px', color: 'var(--color-text-secondary)', margin: '0 0 2rem' }}>Nuestro equipo revisará tu análisis y te contactará con una propuesta de proyecto personalizada</p>

                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: 'var(--color-text-primary)' }}>Nombre</label>
                                    <input 
                                        type="text" 
                                        name="name"
                                        value={leadData.name}
                                        onChange={handleLeadChange}
                                        placeholder="Tu nombre completo"
                                        style={{ width: '100%', padding: '11px 12px', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', fontSize: '14px', backgroundColor: 'var(--color-background-primary)', color: 'var(--color-text-primary)' }}
                                    />
                                </div>

                                <div style={{ marginBottom: '1.5rem' }}>
                                    <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: 'var(--color-text-primary)' }}>Email</label>
                                    <input 
                                        type="email" 
                                        name="email"
                                        value={leadData.email}
                                        onChange={handleLeadChange}
                                        placeholder="tu@email.com"
                                        style={{ width: '100%', padding: '11px 12px', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', fontSize: '14px', backgroundColor: 'var(--color-background-primary)', color: 'var(--color-text-primary)' }}
                                    />
                                </div>

                                <div style={{ marginBottom: '2rem' }}>
                                    <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: 'var(--color-text-primary)' }}>Empresa (opcional)</label>
                                    <input 
                                        type="text" 
                                        name="company"
                                        value={leadData.company}
                                        onChange={handleLeadChange}
                                        placeholder="Tu empresa"
                                        style={{ width: '100%', padding: '11px 12px', border: `0.5px solid var(--color-border-tertiary)`, borderRadius: 'var(--border-radius-md)', fontSize: '14px', backgroundColor: 'var(--color-background-primary)', color: 'var(--color-text-primary)' }}
                                    />
                                </div>

                                <div style={{ display: 'flex', gap: '12px' }}>
                                    <button 
                                        onClick={() => setStep('result')}
                                        style={{ 
                                            flex: 1,
                                            padding: '12px', 
                                            background: 'var(--color-background-secondary)',
                                            border: `0.5px solid var(--color-border-secondary)`,
                                            borderRadius: 'var(--border-radius-md)',
                                            fontSize: '14px',
                                            fontWeight: '500',
                                            cursor: 'pointer',
                                            color: 'var(--color-text-primary)'
                                        }}
                                    >
                                        Atrás
                                    </button>
                                    <button 
                                        onClick={submitLead}
                                        style={{ 
                                            flex: 1,
                                            padding: '12px', 
                                            background: '#185FA5',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: 'var(--border-radius-md)',
                                            fontSize: '14px',
                                            fontWeight: '500',
                                            cursor: 'pointer'
                                        }}
                                    >
                                        Enviar solicitud
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'lead-success' && (
                        <div style={{ textAlign: 'center', padding: '3rem 1rem' }}>
                            <div style={{ fontSize: '56px', marginBottom: '1rem' }}>✓</div>
                            <h2 style={{ fontSize: '28px', fontWeight: '500', margin: '0 0 12px', color: 'var(--color-text-primary)' }}>¡Solicitud enviada!</h2>
                            <p style={{ fontSize: '16px', color: 'var(--color-text-secondary)', margin: '0 0 2rem' }}>Nos pondremos en contacto contigo en las próximas 24 horas con tu propuesta profesional</p>
                            
                            <div style={{ display: 'flex', gap: '12px', justifyContent: 'center' }}>
                                <button 
                                    onClick={() => {
                                        setStep('form');
                                        setFormData({ sector: '', businessName: '', competitors: '', objectives: '', budget: '' });
                                        setLeadData({ name: '', email: '', company: '' });
                                    }}
                                    style={{ 
                                        padding: '11px 24px', 
                                        background: 'var(--color-background-secondary)',
                                        border: `0.5px solid var(--color-border-secondary)`,
                                        borderRadius: 'var(--border-radius-md)',
                                        fontSize: '14px',
                                        fontWeight: '500',
                                        cursor: 'pointer',
                                        color: 'var(--color-text-primary)'
                                    }}
                                >
                                    Generar otro
                                </button>
                                <button 
                                    onClick={goToAgency}
                                    style={{ 
                                        padding: '11px 24px', 
                                        background: '#185FA5',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: 'var(--border-radius-md)',
                                        fontSize: '14px',
                                        fontWeight: '500',
                                        cursor: 'pointer'
                                    }}
                                >
                                    Ir a Bluecell
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<SmartBrief />, document.getElementById('root'));
    </script>
</body>
</html>
